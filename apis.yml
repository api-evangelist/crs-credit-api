name: CRS Credit API
description: >-
  CRS Credit API delivers credit data-as-a-service for fast, compliant financial
  decisioning. The platform aggregates consumer and business credit, identity,
  fraud, and public records data from major bureaus (Equifax, Experian,
  TransUnion, LexisNexis, CIC, PitchPoint) through a single contract and
  developer interface.
